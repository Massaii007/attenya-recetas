<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1612; color: #e8dfd4; font-family: 'Cormorant Garamond', Georgia, serif; min-height: 100vh; }
.header { background: linear-gradient(180deg, #2a241e 0%, #1a1612 100%); border-bottom: 1px solid #3a322a; padding: 32px 20px 24px; text-align: center; }

.container { max-width: 960px; margin: 0 auto; padding: 0 20px; }
.search-wrap { padding: 20px 0; }

.search-input:focus { border-color: #c4a97d; }
.search-input::placeholder { color: #5a4e3e; }
.cats { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 16px; border-bottom: 1px solid #2a241e; }
.cat-btn { background: #221e19; color: #a89880; border: 1px solid #3a322a; padding: 8px 16px; cursor: pointer; font-family: 'Source Sans 3', sans-serif; font-size: 13px; letter-spacing: 1px; white-space: nowrap; flex-shrink: 0; transition: all 0.2s; }
.cat-btn.active, .cat-btn:hover { background: #c4a97d; color: #1a1612; border-color: #c4a97d; }
.subs { display: none; gap: 6px; overflow-x: auto; padding: 12px 0; border-bottom: 1px solid #2a241e; }
.subs.visible { display: flex; }
.sub-btn { background: transparent; color: #8a7d6b; border: 1px solid #3a322a; padding: 5px 12px; cursor: pointer; font-family: 'Source Sans 3', sans-serif; font-size: 12px; white-space: nowrap; transition: all 0.2s; }
.sub-btn.active, .sub-btn:hover { background: #5a4e3e; color: #e8dfd4; }
.results-count { padding: 16px 0 8px; font-size: 13px; color: #8a7d6b; font-family: 'Source Sans 3', sans-serif; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; padding-bottom: 40px; }
.card { background: #221e19; border: 1px solid #3a322a; cursor: pointer; transition: all 0.2s; overflow: hidden; }
.card:hover { border-color: #c4a97d; background: #2a241e; }
.card-img { width: 100%; height: 200px; object-fit: cover; display: block; }
.card-img-placeholder { width: 100%; height: 200px; background: #2a241e; display: flex; align-items: center; justify-content: center; color: #3a322a; font-size: 48px; }
.card-body { padding: 16px 20px 20px; }
.card-cat { font-family: 'Source Sans 3', sans-serif; font-size: 10px; letter-spacing: 2px; color: #8a7d6b; margin-bottom: 6px; text-transform: uppercase; }
.card-name { font-size: 18px; color: #f0e6d6; margin-bottom: 8px; line-height: 1.3; }
.card-desc { font-family: 'Source Sans 3', sans-serif; font-size: 13px; color: #a89880; line-height: 1.5; margin-bottom: 12px; }
.card-tags { display: flex; gap: 8px; flex-wrap: wrap; }
.tag { font-family: 'Source Sans 3', sans-serif; font-size: 11px; background: #2a241e; border: 1px solid #3a322a; padding: 2px 8px; }
.tag-tech { color: #c4a97d; }
.tag-prot { color: #a89880; }
.detail { max-width: 720px; margin: 0 auto; padding: 24px 20px; }
.back-btn { background: none; border: 1px solid #5a4e3e; color: #c4a97d; padding: 8px 20px; cursor: pointer; font-family: 'Source Sans 3', sans-serif; font-size: 14px; letter-spacing: 1px; margin-bottom: 24px; transition: all 0.2s; }
.back-btn:hover { background: #c4a97d; color: #1a1612; }
.detail-img { width: 100%; max-height: 400px; object-fit: cover; margin-bottom: 24px; border: 1px solid #3a322a; }
.detail-header { border-bottom: 1px solid #3a322a; padding-bottom: 24px; margin-bottom: 24px; }
.detail-cat { font-family: 'Source Sans 3', sans-serif; font-size: 11px; letter-spacing: 3px; color: #8a7d6b; margin-bottom: 8px; text-transform: uppercase; }
.detail h1 { font-size: 32px; font-weight: 400; line-height: 1.2; color: #f0e6d6; }
.detail-desc { font-size: 16px; color: #a89880; margin-top: 8px; font-style: italic; }
.detail-tags { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 24px; }
.detail-tag { background: #2a241e; border: 1px solid #3a322a; padding: 6px 14px; font-family: 'Source Sans 3', sans-serif; font-size: 13px; }
.detail-tag span:first-child { color: #8a7d6b; }
.detail-tag span:last-child { color: #c4a97d; }
.tab-btns { display: flex; gap: 12px; margin-bottom: 32px; }
.tab-btn { background: transparent; color: #c4a97d; border: 1px solid #c4a97d; padding: 10px 24px; cursor: pointer; font-family: 'Source Sans 3', sans-serif; font-size: 14px; letter-spacing: 1px; transition: all 0.2s; }
.tab-btn.active { background: #c4a97d; color: #1a1612; }
.content-box { background: #221e19; border: 1px solid #3a322a; padding: 24px; line-height: 1.8; font-size: 15px; }
.content-box p { color: #a89880; text-align: center; font-style: italic; }
.content-box .path { color: #8a7d6b; text-align: center; font-family: 'Source Sans 3', sans-serif; font-size: 13px; margin-top: 12px; }
.footer { border-top: 1px solid #2a241e; padding: 20px; text-align: center; font-family: 'Source Sans 3', sans-serif; font-size: 12px; color: #5a4e3e; letter-spacing: 2px; }
.hidden { display: none; }
@media (max-width: 600px) { .header h1 { font-size: 28px; } .grid { grid-template-columns: 1fr; } .card-name { font-size: 16px; } .card-img { height: 180px; } }
</style>

const cats=[{id:"all",l:"Todo",i:"◈"},{id:"Componentes",l:"Componentes",i:"◆"},{id:"Platos",l:"Platos",i:"◉"},{id:"Entrantes",l:"Entrantes",i:"◎"},{id:"Postres",l:"Postres",i:"◇"}];
const subCats=["Principal","Guarnición HI","Guarnición V","Base/Salsa","Base/Caldo","Base/Elemento"];
let S={cat:"all",sub:null,q:"",sel:null,tab:"ficha"};
function cnt(c){return c==="all"?R.length:R.filter(r=>r.c===c).length;}
function flt(){let r=R;if(S.cat!=="all")r=r.filter(x=>x.c===S.cat);if(S.sub)r=r.filter(x=>x.s===S.sub);if(S.q.trim()){const s=S.q.toLowerCase();r=r.filter(x=>x.n.toLowerCase().includes(s)||x.d.toLowerCase().includes(s)||x.t.toLowerCase().includes(s)||x.p.toLowerCase().includes(s));}return r;}
function rCats(){document.getElementById("cats").innerHTML=cats.map(c=>`<button class="cat-btn${S.cat===c.id?" active":""}" onclick="sC('${c.id}')">${c.i} ${c.l} (${cnt(c.id)})</button>`).join("");}
function rSubs(){const e=document.getElementById("subs");if(S.cat!=="Componentes"){e.classList.remove("visible");return;}e.classList.add("visible");e.innerHTML=`<button class="sub-btn${!S.sub?" active":""}" onclick="sS(null)">Todos</button>`+subCats.map(s=>`<button class="sub-btn${S.sub===s?" active":""}" onclick="sS('${s}')">${s}</button>`).join("");}
function rGrid(){const f=flt();document.getElementById("results-count").textContent=`${f.length} receta${f.length!==1?"s":""}`;document.getElementById("grid").innerHTML=f.map(r=>`<div class="card" onclick="sel('${r.id}')"><img class="card-img" src="${img(r.id)}" alt="${r.n}" onerror="this.outerHTML='<div class=card-img-placeholder>◈</div>'"><div class="card-body"><div class="card-cat">${r.c}${r.s?" · "+r.s:""}</div><div class="card-name">${r.n}</div><div class="card-desc">${r.d}</div><div class="card-tags"><span class="tag tag-tech">${r.t}</span>${r.p!=="-"?`<span class="tag tag-prot">${r.p}</span>`:""}</div></div></div>`).join("");}
function rDet(){const r=S.sel;if(!r){document.getElementById("detail-view").classList.add("hidden");document.getElementById("catalog-view").classList.remove("hidden");return;}document.getElementById("catalog-view").classList.add("hidden");document.getElementById("detail-view").classList.remove("hidden");document.getElementById("detail").innerHTML=`<button class="back-btn" onclick="bk()">← CATÁLOGO</button><img class="detail-img" src="${img(r.id)}" alt="${r.n}" onerror="this.style.display='none'"><div class="detail-header"><div class="detail-cat">${r.c}${r.s?" · "+r.s:""}</div><h1>${r.n}</h1><p class="detail-desc">${r.d}</p></div><div class="detail-tags"><div class="detail-tag"><span>Técnica: </span><span>${r.t}</span></div>${r.p!=="-"?`<div class="detail-tag"><span>Proteína: </span><span>${r.p}</span></div>`:""}<div class="detail-tag"><span>PAX: </span><span>25</span></div></div><div class="tab-btns"><button class="tab-btn${S.tab==="ficha"?" active":""}" onclick="sT('ficha')">FICHA TÉCNICA</button><button class="tab-btn${S.tab==="story"?" active":""}" onclick="sT('story')">STORYTELLING</button></div><div class="content-box">${S.tab==="ficha"?`<p>Ficha técnica disponible en Obsidian.</p>`:`<p>Storytelling disponible en Obsidian.</p>`}</div>`;}
function ren(){rCats();rSubs();rGrid();rDet();document.getElementById("total-count").textContent=R.length+" recetas · Tenerife";document.getElementById("footer").textContent="ATTENYA · SISTEMA CULINARIO · "+R.length+" RECETAS · 2026";}
function sC(c){S.cat=c;S.sub=null;ren();}
function sS(s){S.sub=s;ren();}
function sel(id){S.sel=R.find(r=>r.id===id);S.tab="ficha";ren();window.scrollTo(0,0);}
function bk(){S.sel=null;ren();}
function sT(t){S.tab=t;rDet();}
document.getElementById("search").addEventListener("input",e=>{S.q=e.target.value;rGrid();});
ren();
</script>
