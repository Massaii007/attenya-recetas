<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATTENYA · Sistema Culinario</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1612; color: #e8dfd4; font-family: 'Cormorant Garamond', Georgia, serif; min-height: 100vh; }

/* === HEADER === */
.header { background: linear-gradient(180deg, #2a241e 0%, #1a1612 100%); border-bottom: 1px solid #3a322a; padding: 32px 20px 24px; text-align: center; }
.header-sub { font-family: 'Jost', sans-serif; font-size: 11px; letter-spacing: 6px; color: #8a7d6b; margin-bottom: 8px; text-transform: uppercase; }
.header h1 { font-size: 42px; font-weight: 300; color: #f0e6d6; letter-spacing: 12px; }
.header-count { font-size: 14px; color: #8a7d6b; margin-top: 8px; font-family: 'Jost', sans-serif; }

/* === NAVIGATION TABS === */
.nav-bar { background: #221e19; border-bottom: 1px solid #3a322a; padding: 0 20px; display: flex; justify-content: center; gap: 0; overflow-x: auto; }
.nav-tab { background: none; border: none; border-bottom: 2px solid transparent; color: #8a7d6b; padding: 14px 24px; cursor: pointer; font-family: 'Jost', sans-serif; font-size: 13px; letter-spacing: 2px; text-transform: uppercase; white-space: nowrap; transition: all 0.2s; }
.nav-tab:hover { color: #c4a97d; }
.nav-tab.active { color: #c4a97d; border-bottom-color: #c4a97d; }

/* === CONTAINER === */
.container { max-width: 960px; margin: 0 auto; padding: 0 20px; }

/* === CATALOG STYLES (existing) === */
.search-wrap { padding: 20px 0; }
.search-input { width: 100%; background: #221e19; border: 1px solid #3a322a; color: #e8dfd4; padding: 14px 18px; font-size: 15px; font-family: 'Jost', sans-serif; outline: none; }
.search-input:focus { border-color: #c4a97d; }
.search-input::placeholder { color: #5a4e3e; }
.cats { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 16px; border-bottom: 1px solid #2a241e; }
.cat-btn { background: #221e19; color: #a89880; border: 1px solid #3a322a; padding: 8px 16px; cursor: pointer; font-family: 'Jost', sans-serif; font-size: 13px; letter-spacing: 1px; white-space: nowrap; flex-shrink: 0; transition: all 0.2s; }
.cat-btn.active, .cat-btn:hover { background: #c4a97d; color: #1a1612; border-color: #c4a97d; }
.subs { display: none; gap: 6px; overflow-x: auto; padding: 12px 0; border-bottom: 1px solid #2a241e; }
.subs.visible { display: flex; }
.sub-btn { background: transparent; color: #8a7d6b; border: 1px solid #3a322a; padding: 5px 12px; cursor: pointer; font-family: 'Jost', sans-serif; font-size: 12px; white-space: nowrap; transition: all 0.2s; }
.sub-btn.active, .sub-btn:hover { background: #5a4e3e; color: #e8dfd4; }
.results-count { padding: 16px 0 8px; font-size: 13px; color: #8a7d6b; font-family: 'Jost', sans-serif; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; padding-bottom: 40px; }
.card { background: #221e19; border: 1px solid #3a322a; cursor: pointer; transition: all 0.2s; overflow: hidden; }
.card:hover { border-color: #c4a97d; background: #2a241e; }
.card-img { width: 100%; height: 180px; object-fit: cover; display: block; background: #2a241e; }
.card-img-placeholder { width: 100%; height: 180px; background: linear-gradient(135deg, #2a241e 0%, #3a322a 100%); display: flex; align-items: center; justify-content: center; font-size: 40px; color: #3a322a; }
.card-body { padding: 16px 20px 20px; }
.card-cat { font-family: 'Jost', sans-serif; font-size: 10px; letter-spacing: 2px; color: #8a7d6b; margin-bottom: 6px; text-transform: uppercase; }
.card-day { font-family: 'Jost', sans-serif; font-size: 10px; letter-spacing: 1px; color: #7da8c4; margin-bottom: 4px; padding: 2px 8px; background: rgba(125,168,196,0.1); border-radius: 3px; display: inline-flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.card-prot { padding: 1px 7px; border-radius: 3px; font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 500; }
.card-prot[data-prot="Pescado blanco"] { background: rgba(120,180,210,0.15); color: #78b4d2; }
.card-prot[data-prot="Pescado azul"] { background: rgba(80,130,190,0.2); color: #6fa0d0; }
.card-prot[data-prot="Carne blanca"] { background: rgba(210,180,140,0.15); color: #d2b48c; }
.card-prot[data-prot="Carne roja"] { background: rgba(190,100,100,0.2); color: #c47070; }
.card-prot[data-prot*="Cerdo"] { background: rgba(200,150,120,0.18); color: #c89678; }
.card-prot[data-prot="Vegetariano"] { background: rgba(120,180,120,0.15); color: #7db47d; }
.card-prot[data-prot*="Pasta"], .card-prot[data-prot="Hidrato"] { background: rgba(210,190,130,0.15); color: #d2be82; }
.card-prot[data-prot="Marisco"] { background: rgba(210,140,160,0.15); color: #d28ca0; }
.card-prot[data-prot="Huevo"] { background: rgba(230,200,100,0.15); color: #d2be64; }
.card-prot[data-prot="Legumbre"] { background: rgba(160,140,100,0.18); color: #b4a064; }
.card-prot[data-prot="Lácteo"] { background: rgba(220,210,190,0.15); color: #d2c8b4; }
.card-prot[data-prot="Fruta"] { background: rgba(200,160,100,0.15); color: #d2a064; }
.card-prot[data-prot="Chocolate"] { background: rgba(140,90,60,0.25); color: #b47850; }
.card-name { font-size: 18px; color: #f0e6d6; margin-bottom: 8px; line-height: 1.3; }
.card-desc { font-family: 'Jost', sans-serif; font-size: 13px; color: #a89880; line-height: 1.5; margin-bottom: 12px; font-weight: 300; }
.card-tags { display: flex; gap: 8px; flex-wrap: wrap; }
.tag { font-family: 'Jost', sans-serif; font-size: 11px; background: #2a241e; border: 1px solid #3a322a; padding: 2px 8px; }
.tag-tech { color: #c4a97d; }
.tag-prot { color: #a89880; }

/* === DETAIL STYLES (existing) === */
.detail { max-width: 720px; margin: 0 auto; padding: 24px 20px; }
.back-btn { background: none; border: 1px solid #5a4e3e; color: #c4a97d; padding: 8px 20px; cursor: pointer; font-family: 'Jost', sans-serif; font-size: 14px; letter-spacing: 1px; margin-bottom: 24px; transition: all 0.2s; }
.back-btn:hover { background: #c4a97d; color: #1a1612; }
.detail-hero { width: 100%; max-height: 400px; object-fit: cover; display: block; margin-bottom: 24px; border: 1px solid #3a322a; }
.detail-header { border-bottom: 1px solid #3a322a; padding-bottom: 24px; margin-bottom: 24px; }
.detail-cat { font-family: 'Jost', sans-serif; font-size: 11px; letter-spacing: 3px; color: #8a7d6b; margin-bottom: 8px; text-transform: uppercase; }
.detail h1 { font-size: 32px; font-weight: 400; line-height: 1.2; color: #f0e6d6; }
.detail-desc { font-size: 16px; color: #a89880; margin-top: 8px; font-style: italic; }
.detail-tags { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 24px; }
.detail-tag { background: #2a241e; border: 1px solid #3a322a; padding: 6px 14px; font-family: 'Jost', sans-serif; font-size: 13px; }
.detail-tag span:first-child { color: #8a7d6b; }
.detail-tag span:last-child { color: #c4a97d; }
.tab-btns { display: flex; gap: 12px; margin-bottom: 32px; }
.tab-btn { background: transparent; color: #c4a97d; border: 1px solid #c4a97d; padding: 10px 24px; cursor: pointer; font-family: 'Jost', sans-serif; font-size: 14px; letter-spacing: 1px; transition: all 0.2s; }
.tab-btn.active { background: #c4a97d; color: #1a1612; }
.content-box { background: #221e19; border: 1px solid #3a322a; padding: 32px 36px; line-height: 2; font-size: 14px; font-weight: 300; color: #c4b8a8; font-family: 'Jost', sans-serif; letter-spacing: 0.2px; }
.content-box .empty-msg { color: #a89880; text-align: center; font-style: italic; font-family: 'Cormorant Garamond', serif; }
.content-box .loading { color: #8a7d6b; text-align: center; font-style: italic; }
.content-section { margin-bottom: 36px; }
.content-section:last-child { margin-bottom: 0; }
.content-section-title { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 300; color: #c4a97d; letter-spacing: 2px; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid #2a241e; }
.content-box h3 { font-family: 'Cormorant Garamond', serif; font-size: 17px; font-weight: 400; color: #e8dfd4; margin: 24px 0 10px; letter-spacing: 0.5px; }
.content-box h4 { font-family: 'Jost', sans-serif; font-size: 12px; font-weight: 400; color: #c4a97d; margin: 16px 0 6px; letter-spacing: 2px; text-transform: uppercase; }
.content-box p { color: #c4b8a8; margin-bottom: 10px; font-weight: 300; }
.content-box ul, .content-box ol { margin: 10px 0 10px 20px; color: #c4b8a8; }
.content-box li { margin-bottom: 6px; font-weight: 300; }
.content-box li::marker { color: #5a4e3e; }
.content-box strong { color: #e8dfd4; font-weight: 400; }
.content-box em { color: #8a7d6b; font-weight: 300; }
.content-box blockquote { border-left: 2px solid #5a4e3e; padding: 14px 24px; margin: 20px 0; background: #1a1612; font-family: 'Cormorant Garamond', serif; font-size: 17px; font-style: italic; color: #a89880; line-height: 1.7; }
.content-box hr { border: none; border-top: 1px solid #2a241e; margin: 24px 0; }
.content-box table { width: 100%; border-collapse: collapse; margin: 16px 0; }
.content-box th, .content-box td { border: 1px solid #2a241e; padding: 10px 14px; text-align: left; font-size: 13px; font-weight: 300; }
.content-box th { background: #1a1612; color: #8a7d6b; font-weight: 400; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; }
.content-box td { color: #c4b8a8; }
.story-content { font-family: 'Cormorant Garamond', serif; font-size: 18px; line-height: 2; color: #c4b8a8; font-weight: 300; }
.story-content h1 { font-size: 26px; font-weight: 300; color: #f0e6d6; margin-bottom: 8px; letter-spacing: 1px; }
.story-content h2 { font-size: 20px; font-weight: 300; color: #c4a97d; margin: 28px 0 14px; border-bottom: 1px solid #2a241e; padding-bottom: 8px; letter-spacing: 1px; }
.story-content p { margin-bottom: 16px; }
.quote-box { background: #1a1612; border-left: 2px solid #5a4e3e; padding: 20px 28px; margin-top: 28px; font-family: 'Cormorant Garamond', serif; font-size: 17px; font-style: italic; color: #a89880; line-height: 1.7; }

/* === COMPONENTES CLICKABLES === */
.componentes-block { margin-bottom: 32px; }
.componentes-title { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 300; color: #c4a97d; letter-spacing: 2px; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid #2a241e; }
.componentes-grid { display: flex; flex-direction: column; gap: 8px; }
.comp-card { display: flex; align-items: center; gap: 14px; background: #221e19; border: 1px solid #2a241e; padding: 10px 14px; cursor: pointer; transition: all 0.2s; }
.comp-card:hover { border-color: #c4a97d; background: #2a241e; }
.comp-card-img { width: 52px; height: 52px; object-fit: cover; border: 1px solid #3a322a; flex-shrink: 0; }
.comp-card-info { flex: 1; min-width: 0; }
.comp-card-name { font-family: 'Cormorant Garamond', serif; font-size: 17px; color: #f0e6d6; font-weight: 400; }
.comp-card-tipo { font-family: 'Jost', sans-serif; font-size: 11px; letter-spacing: 2px; color: #8a7d6b; text-transform: uppercase; margin-top: 2px; }
.comp-card-arrow { color: #5a4e3e; font-size: 18px; flex-shrink: 0; transition: color 0.2s; }
.comp-card:hover .comp-card-arrow { color: #c4a97d; }
.comp-card-pending { opacity: 0.5; cursor: default; border-style: dashed; }
.comp-card-pending:hover { border-color: #2a241e; background: #221e19; }
.comp-card-pending .comp-card-arrow { display: none; }
.detail-meta { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; margin-bottom: 28px; }
.meta-item { background: #1a1612; border: 1px solid #2a241e; padding: 12px 16px; }
.meta-label { font-family: 'Jost', sans-serif; font-size: 9px; letter-spacing: 3px; color: #6b6158; text-transform: uppercase; margin-bottom: 4px; font-weight: 400; }
.meta-value { font-family: 'Jost', sans-serif; font-size: 14px; color: #e8dfd4; font-weight: 300; }
.pdf-btn { background: transparent; color: #8a7d6b; border: 1px solid #3a322a; padding: 8px 20px; cursor: pointer; font-family: 'Jost', sans-serif; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; transition: all 0.2s; margin-left: 12px; }
.pdf-btn:hover { background: #c4a97d; color: #1a1612; border-color: #c4a97d; }

/* === MENU VIEW === */
.menu-header { padding: 28px 0 20px; text-align: center; border-bottom: 1px solid #3a322a; margin-bottom: 24px; }
.menu-periodo { font-size: 28px; font-weight: 300; color: #f0e6d6; letter-spacing: 2px; }
.menu-meta { font-family: 'Jost', sans-serif; font-size: 13px; color: #8a7d6b; margin-top: 6px; }
.menu-day { background: #221e19; border: 1px solid #3a322a; margin-bottom: 16px; overflow: hidden; transition: border-color 0.2s; }
.menu-day:hover { border-color: #5a4e3e; }
.menu-day.chef-free { border-left: 3px solid #8b3a3a; }
.menu-day-header { padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
.menu-day-date { font-family: 'Jost', sans-serif; font-size: 14px; font-weight: 600; color: #e8dfd4; }
.menu-day-label { font-family: 'Jost', sans-serif; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; }
.menu-day-label.normal { color: #8a7d6b; }
.menu-day-label[data-prot="Pescado blanco"] { color: #78b4d2; }
.menu-day-label[data-prot="Pescado azul"] { color: #6fa0d0; }
.menu-day-label[data-prot="Carne blanca"] { color: #d2b48c; }
.menu-day-label[data-prot="Carne roja"] { color: #c47070; }
.menu-day-label[data-prot*="Cerdo"] { color: #c89678; }
.menu-day-label[data-prot="Vegetariano"] { color: #7db47d; }
.menu-day-label[data-prot*="Pasta"], .menu-day-label[data-prot="Hidrato"] { color: #d2be82; }
.menu-day-label[data-prot="Marisco"] { color: #d28ca0; }
.menu-day-label.chef-free-label { color: #c47d7d; }
.menu-day-body { padding: 0 20px 20px; display: none; }
.menu-day.open .menu-day-body { display: block; }
.menu-day.open .menu-day-header { border-bottom: 1px solid #3a322a; padding-bottom: 14px; margin-bottom: 0; }
.menu-row { display: grid; grid-template-columns: 110px 1fr; gap: 0; padding: 10px 0; border-bottom: 1px solid #2a241e; }
.menu-row:last-child { border-bottom: none; }
.menu-row-label { font-family: 'Jost', sans-serif; font-size: 11px; letter-spacing: 1px; color: #8a7d6b; text-transform: uppercase; padding-top: 2px; }
.menu-row-value { font-family: 'Jost', sans-serif; font-size: 14px; color: #d4c8b8; line-height: 1.5; }
.menu-recipe-link { color: #c4a97d; cursor: pointer; text-decoration: none; border-bottom: 1px dotted #5a4e3e; transition: border-color 0.2s; }
.menu-recipe-link:hover { border-bottom-color: #c4a97d; }
.menu-pdf-icon { display: inline-block; color: #5a4e3e; cursor: pointer; font-size: 12px; margin-left: 6px; padding: 2px 6px; border: 1px solid #3a322a; transition: all 0.2s; vertical-align: middle; }
.menu-pdf-icon:hover { background: #c4a97d; color: #1a1612; border-color: #c4a97d; }
.menu-produccion { margin-top: 12px; padding: 12px 16px; background: #2a241e; font-family: 'Jost', sans-serif; font-size: 13px; color: #a89880; line-height: 1.6; }
.menu-produccion-title { font-size: 10px; letter-spacing: 2px; color: #8a7d6b; text-transform: uppercase; margin-bottom: 6px; }

/* === MISE EN PLACE VIEW === */
.mise-day { background: #221e19; border: 1px solid #3a322a; margin-bottom: 16px; overflow: hidden; }
.mise-day.chef-free { border-left: 3px solid #8b3a3a; }
.mise-day-header { padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
.mise-day-header-left { display: flex; align-items: baseline; gap: 12px; }
.mise-day-date { font-family: 'Jost', sans-serif; font-size: 14px; font-weight: 600; color: #e8dfd4; }
.mise-day-title { font-family: 'Cormorant Garamond', serif; font-size: 16px; color: #a89880; font-style: italic; }
.mise-carga { font-family: 'Jost', sans-serif; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; padding: 3px 10px; border: 1px solid; }
.mise-carga.baja { color: #7d9a6b; border-color: #7d9a6b; }
.mise-carga.media { color: #c4a97d; border-color: #c4a97d; }
.mise-carga.media-alta { color: #c49a5d; border-color: #c49a5d; }
.mise-carga.alta { color: #c47d7d; border-color: #c47d7d; }
.mise-carga.auxiliar { color: #8b3a3a; border-color: #8b3a3a; }
.mise-day-body { padding: 0 20px 20px; display: none; }
.mise-day.open .mise-day-body { display: block; }
.mise-day.open .mise-day-header { border-bottom: 1px solid #3a322a; }
.mise-task { display: grid; grid-template-columns: 60px 1fr auto; gap: 12px; padding: 10px 0; border-bottom: 1px solid #2a241e; align-items: start; }
.mise-task:last-child { border-bottom: none; }
.mise-hora { font-family: 'Jost', sans-serif; font-size: 13px; font-weight: 600; color: #c4a97d; padding-top: 1px; }
.mise-tarea { font-family: 'Jost', sans-serif; font-size: 14px; color: #d4c8b8; line-height: 1.5; }
.mise-tipo { font-family: 'Jost', sans-serif; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; padding: 2px 8px; white-space: nowrap; }
.mise-tipo.servicio { color: #c4a97d; background: rgba(196,169,125,0.1); }
.mise-tipo.anticipacion { color: #7da8c4; background: rgba(125,168,196,0.1); }
.mise-tipo.chef-free-task { color: #c47d7d; background: rgba(196,125,125,0.1); }
.mise-tipo.nota { color: #8a7d6b; background: rgba(138,125,107,0.1); }
.mise-note { padding: 8px 12px; margin-top: 8px; font-family: 'Jost', sans-serif; font-size: 12px; color: #8a7d6b; font-style: italic; border-left: 2px solid #3a322a; }

/* === COMPRAS VIEW === */
.compra-lista { background: #221e19; border: 1px solid #3a322a; margin-bottom: 20px; overflow: hidden; }
.compra-header { padding: 18px 20px; cursor: pointer; border-bottom: 1px solid transparent; }
.compra-lista.open .compra-header { border-bottom-color: #3a322a; }
.compra-titulo { font-size: 20px; font-weight: 400; color: #f0e6d6; margin-bottom: 4px; }
.compra-meta { font-family: 'Jost', sans-serif; font-size: 12px; color: #8a7d6b; line-height: 1.5; }
.compra-body { padding: 0 20px 20px; display: none; }
.compra-lista.open .compra-body { display: block; }
.compra-seccion { margin-top: 16px; }
.compra-seccion-title { font-family: 'Jost', sans-serif; font-size: 12px; letter-spacing: 2px; color: #c4a97d; text-transform: uppercase; padding-bottom: 8px; border-bottom: 1px solid #3a322a; margin-bottom: 8px; }
.compra-item { display: grid; grid-template-columns: 1fr 100px; gap: 8px; padding: 6px 0; border-bottom: 1px solid #2a241e; font-family: 'Jost', sans-serif; font-size: 13px; }
.compra-item:last-child { border-bottom: none; }
.compra-producto { color: #d4c8b8; }
.compra-cantidad { color: #c4a97d; text-align: right; font-weight: 600; }
.compra-nota { font-size: 11px; color: #8a7d6b; font-style: italic; grid-column: 1 / -1; padding-left: 12px; }

/* === FOOTER === */
.footer { border-top: 1px solid #2a241e; padding: 20px; text-align: center; font-family: 'Jost', sans-serif; font-size: 12px; color: #5a4e3e; letter-spacing: 2px; }
.hidden { display: none; }

/* === RESPONSIVE === */
@media (max-width: 600px) {
  .header h1 { font-size: 28px; }
  .grid { grid-template-columns: 1fr; }
  .card-name { font-size: 16px; }
  .card-img { height: 160px; }
  .nav-tab { padding: 12px 16px; font-size: 11px; letter-spacing: 1px; }
  .menu-row { grid-template-columns: 90px 1fr; }
  .mise-task { grid-template-columns: 50px 1fr; }
  .mise-tipo { grid-column: 2; }
  .mise-day-header { flex-direction: column; align-items: flex-start; gap: 8px; }
  .mise-day-header-left { flex-direction: column; gap: 4px; }
  .compra-item { grid-template-columns: 1fr 80px; }
}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>

<div class="header">
  <div class="header-sub">ATTENYA SENIOR RESIDENCES</div>
  <h1>Sistema Culinario</h1>
  <div class="header-count" id="total-count"></div>

    periodoSiguienteData = menuData_prev;
  } else if (today >= pvFirst && today <= pvLast) {
    periodoActualData = menuData_prev;
    periodoSiguienteData = menuData;
  } else if (today < mdFirst && today < pvFirst) {
    /* Both in the future — the earlier one is "actual" */
    periodoActualData = mdFirst < pvFirst ? menuData : menuData_prev;
    periodoSiguienteData = mdFirst < pvFirst ? menuData_prev : menuData;
  } else {
    /* Both in the past — the later one is "actual" */
    periodoActualData = mdLast > pvLast ? menuData : menuData_prev;
    periodoSiguienteData = mdLast > pvLast ? menuData_prev : menuData;
  }
  /* Determine label: is the "otro" periodo in the past or future? */
  var otroFirst = periodoSiguienteData.dias[0].fecha;
  periodoOtroLabel = otroFirst < today ? 'anterior' : 'siguiente';
})();

/* Build ID sets from the detected assignment */
function buildIdsFromMenu(md) {

}

/* Build a map of recipeId → { order, dayLabel, role, prot } for periodo sorting */
function buildPeriodoSortMap(menuDataRef) {
  var sortMap = {};
  if (!menuDataRef || !menuDataRef.dias) return sortMap;
  var roleOrder = { entrante: 0, principal: 1, guarnicion: 2, postre: 3 };
  menuDataRef.dias.forEach(function(d, dayIdx) {
    ['entrante','principal','guarnicion','postre'].forEach(function(k) {
      if (d[k] && d[k].id) {
        sortMap[d[k].id] = {
          order: dayIdx * 100 + roleOrder[k] * 10,
          dayLabel: d.ds,
          prot: d.prot || '',
          role: k,
          parentId: null
        };
      }
    });
  });
  return sortMap;
}

var periodoSortMap_actual = buildPeriodoSortMap(periodoActualData);
var periodoSortMap_siguiente = buildPeriodoSortMap(periodoSiguienteData);

/* Expand periodo IDs with componentes from assembled dishes + track parent relationships */
var componenteParents = {};
async function expandPeriodoIds() {
  async function expandAndTrack(ids, sortMap) {
    var toCheck = [...ids];
    var v = Date.now();
    for (var i = 0; i < toCheck.length; i++) {
      var id = toCheck[i];
      try {
        var res = await fetch('data/' + id + '.json?v=' + v);
        if (!res.ok) continue;
        var d = await res.json();
        if (d && d.componentes) {
          d.componentes.forEach(function(c) {
            if (c.id && !c.id.startsWith('pendiente_')) {
              ids.add(c.id);
              componenteParents[c.id] = id;
              if (sortMap[id]) {
                sortMap[c.id] = {
                  order: sortMap[id].order + 1,
                  dayLabel: sortMap[id].dayLabel,
                  prot: sortMap[id].prot || '',
                  role: "componente",
                  parentId: id
                };
              }
            }
          });
        }
      } catch(e) {}
    }
    /* Mark remaining unassigned IDs */
    ids.forEach(function(rid) {
      if (!sortMap[rid]) {
        sortMap[rid] = { order: 9999, dayLabel: "", prot: "", role: "componente", parentId: null };
      }
    });
  }
  await expandAndTrack(periodoIds_actual, periodoSortMap_actual);
  await expandAndTrack(periodoIds_siguiente, periodoSortMap_siguiente);
  periodoIds = periodoIds_actual;
}

function activeSortMap() {
  if (state.periodo === 'actual') return periodoSortMap_actual;
  if (state.periodo === 'siguiente') return periodoSortMap_siguiente;
  return null;
}

function count(c) {
  let r = recipes;
  const pids = activePeriodoIds();
  if (pids) r = r.filter(x => pids.has(x.id));
  return c === "all" ? r.length : r.filter(x => x.c === c).length;
}

function filter() {
  let r = recipes;
  const pids = activePeriodoIds();
  if (pids) r = r.filter(x => pids.has(x.id));
  if (state.cat !== "all") r = r.filter(x => x.c === state.cat);
  if (state.sub) r = r.filter(x => x.s === state.sub);
  if (state.search.trim()) {
    const s = state.search.toLowerCase();
    r = r.filter(x => x.n.toLowerCase().includes(s) || x.d.toLowerCase().includes(s) || x.t.toLowerCase().includes(s) || x.p.toLowerCase().includes(s));
  }
  /* Sort by periodo day order when a periodo filter is active */
  const sm = activeSortMap();
  if (sm) {
    r.sort(function(a, b) {
      var oa = sm[a.id] ? sm[a.id].order : 9999;
      var ob = sm[b.id] ? sm[b.id].order : 9999;
      return oa - ob;
    });
  }
  return r;
}

/* --- JSON cache & markdown renderer --- */
const jsonCache = {};

function md2html(txt) {
  if (!txt) return '';
  let h = txt
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/^#### (.+)$/gm, '<h4>$1</h4>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^---+$/gm, '<hr>')
    .replace(/^[-•·]\s+(.+)$/gm, '<li>$1</li>')
    .replace(/^\d+[.)]\s*(.+)$/gm, '<li>$1</li>');
  h = h.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');
  h = h.replace(/^(\|.+\|)$/gm, function(row) {
    if (/^[\|\s\-:]+$/.test(row)) return '';
    const cells = row.split('|').filter(c => c.trim() !== '');
    const tag = row.includes('---') ? 'th' : 'td';
    return '<tr>' + cells.map(c => `<${tag}>${c.trim()}</${tag}>`).join('') + '</tr>';
  });
  h = h.replace(/((?:<tr>.*<\/tr>\n?)+)/g, '<table>$1</table>');
  h = h.replace(/^([A-ZÁÉÍÓÚÑÜ][A-ZÁÉÍÓÚÑÜ\s\—\-\(\)0-9,°]{5,})$/gm, '<h3>$1</h3>');
  h = h.replace(/^(?!<[huptol])((?!\s*$).+)$/gm, '<p>$1</p>');
  h = h.replace(/\n{2,}/g, '\n');
  return h;
}

function renderSection(title, content) {
  if (!content) return '';
  return `<div class="content-section"><div class="content-section-title">${title}</div>${md2html(content)}</div>`;
}

    const tipo = c.tipo ? c.tipo.replace('_', ' ') : '';

      cards += `<div class="comp-card comp-card-pending">
        <div style="width:52px;height:52px;background:#1a1612;border:1px dashed #3a322a;display:flex;align-items:center;justify-content:center;flex-shrink:0"><span style="color:#5a4e3e;font-size:20px">?</span></div>
        <div class="comp-card-info"><div class="comp-card-name">${name}</div><div class="comp-card-tipo">${tipo}${nota ? nota : ' · pendiente de crear'}</div></div>
      </div>`;
    } else {
      const img = r ? getImg(r.id) : '';
      cards += `<div class="comp-card" onclick="select('${c.id}')">

/* ============================================================
   DAY PACK DOWNLOAD — ZIP with all PDFs for a menu day
   ============================================================ */
async function downloadDayPack(fecha) {
  var dia = getMenuData().dias.find(function(d) { return d.fecha === fecha; });
  if (!dia) { alert('Día no encontrado'); return; }

  /* Collect recipe IDs from the day */
  var ids = new Set();
  ['entrante','principal','guarnicion','postre'].forEach(function(k) {
    if (dia[k] && dia[k].id) ids.add(dia[k].id);
  });

  /* Expand with components from each recipe's JSON */
  var baseIds = Array.from(ids);
  for (var i = 0; i < baseIds.length; i++) {
    try {
      var d = await loadJson(baseIds[i]);
      if (d && d.componentes) {
        d.componentes.forEach(function(c) {
          if (c.id && !c.id.startsWith('pendiente_')) ids.add(c.id);
        });
      }
    } catch(e) {}
  }

  /* Fetch PDFs and build ZIP */
  var zip = new JSZip();
  var found = 0;
  var allIds = Array.from(ids);
  for (var j = 0; j < allIds.length; j++) {
    var id = allIds[j];
    try {
      var res = await fetch('data/pdf/' + id + '.pdf');
      if (res.ok) {
        zip.file(id + '.pdf', await res.blob());
        found++;
      }
    } catch(e) {}
  }

  if (found === 0) { alert('No se encontraron PDFs para este día'); return; }

  /* Generate and download */
  var ds = dia.ds.replace(/\//g, '-').replace(/\s+/g, '_');
  var blob = await zip.generateAsync({type: 'blob'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'Pack_' + ds + '.zip';
  a.click();
  URL.revokeObjectURL(a.href);
}

/* ============================================================
   NAVIGATION & INTERACTION
   ============================================================ */
function switchView(v) {
  state.view = v;
  state.selected = null;
  navStack.length = 0;
  
  // Hide all views
  document.getElementById("view-catalogo").classList.add("hidden");
  document.getElementById("view-menu").classList.add("hidden");
  document.getElementById("view-mise").classList.add("hidden");
  document.getElementById("view-compras").classList.add("hidden");
  document.getElementById("detail-view").classList.add("hidden");
  
  // Show selected view
  document.getElementById("view-" + v).classList.remove("hidden");
  
  // Update nav tabs
  document.querySelectorAll(".nav-tab").forEach(t => t.classList.remove("active"));
  document.querySelector(`.nav-tab[onclick="switchView('${v}')"]`).classList.add("active");
  
  window.scrollTo(0, 0);
}

function toggleDay(el) {
  // Don't toggle if clicking a recipe link
  if (event.target.classList.contains('menu-recipe-link')) return;
  el.classList.toggle("open");
}

function toggleCompra(el) {
  el.classList.toggle("open");
}

function goToRecipe(id) {
  const r = recipes.find(x => x.id === id);
  if (r) {
    state.selected = r;
    state.tab = "ficha";
    renderDetail();
    window.scrollTo(0, 0);
  }
}

function setCat(c) { state.cat = c; state.sub = null; renderCats(); renderSubs(); renderGrid(); }
function setSub(s) { state.sub = s; renderSubs(); renderGrid(); }
function select(id) {
  if (state.selected) navStack.push(state.selected);
  state.selected = recipes.find(r => r.id === id); state.tab = "ficha"; renderDetail(); window.scrollTo(0,0);
}
function back() {
  if (navStack.length > 0) {
    state.selected = navStack.pop();
    state.tab = "ficha";
    renderDetail();
    window.scrollTo(0,0);
  } else {
    state.selected = null;
    document.getElementById("detail-view").classList.add("hidden");
    document.getElementById("view-" + state.view).classList.remove("hidden");
  }
}
function setTab(t) { state.tab = t; renderDetail(); }

document.getElementById("search").addEventListener("input", e => { state.search = e.target.value; renderGrid(); });

/* ============================================================
   PERIODO SWITCHING (top tabs — date-based, controls Menu/Mise/Compras)
   p1 = menuData (newest), p2 = menuData_prev (oldest)
   Independent of actual/siguiente detection in catalog buttons.
   ============================================================ */
var currentPeriodo = 'p1';

function getMenuData() { return currentPeriodo === 'p1' ? menuData : menuData_prev; }
function getMiseData() { return currentPeriodo === 'p1' ? miseData : miseData_prev; }
function getComprasData() { return currentPeriodo === 'p1' ? comprasData : comprasData_prev; }

function switchPeriodo(p) {
  currentPeriodo = p;
  document.getElementById('tab-p1').style.background = p === 'p1' ? 'rgba(255,255,255,0.1)' : 'transparent';
  document.getElementById('tab-p1').style.color = p === 'p1' ? '#d4c5a0' : '#888';
  document.getElementById('tab-p1').style.borderColor = p === 'p1' ? 'rgba(255,255,255,0.2)' : 'rgba(255,255,255,0.1)';
  document.getElementById('tab-p2').style.background = p === 'p2' ? 'rgba(255,255,255,0.1)' : 'transparent';
  document.getElementById('tab-p2').style.color = p === 'p2' ? '#d4c5a0' : '#888';
  document.getElementById('tab-p2').style.borderColor = p === 'p2' ? 'rgba(255,255,255,0.2)' : 'rgba(255,255,255,0.1)';
  renderMenu();
  renderMise();
  renderCompras();
}

function downloadPeriodoPDF(tipo) {
  /* Build suffix from the active periodo's date range */
  var md = getMenuData();
  var first = md.dias[0].fecha.slice(8,10);
  var last = md.dias[md.dias.length-1].fecha.slice(8,10);
  var mon = md.dias[0].fecha.slice(5,7);
  var months = {
    '01':'ene','02':'feb','03':'mar','04':'abr','05':'may','06':'jun',
    '07':'jul','08':'ago','09':'sep','10':'oct','11':'nov','12':'dic'
  };
  var suffix = parseInt(first) + '-' + parseInt(last) + months[mon];
  var paths = {
    menu: ['data/pdf/Menu_periodo_' + suffix + '.pdf', 'Menu_ATTENYA.pdf'],
    mise: ['data/pdf/Mise_periodo_' + suffix + '.pdf', 'Mise_en_Place_ATTENYA.pdf'],
    compras: ['data/pdf/Compras_periodo_' + suffix + '.pdf', 'Compras_ATTENYA.pdf']
  };
  var p = paths[tipo];
  if (p) downloadFile(p[0], p[1]);
}

/* ============================================================
   INIT
   ============================================================ */
async function init() {
  document.getElementById("total-count").textContent = recipes.length + " recetas · Tenerife";
  document.getElementById("footer").textContent = "ATTENYA · SISTEMA CULINARIO · " + recipes.length + " RECETAS · 2026";
  
  /* Populate top periodo tabs with dates from data */
  document.getElementById('tab-p1').textContent = menuData.periodo;
  document.getElementById('tab-p2').textContent = menuData_prev.periodo;
  
  /* Expand periodo IDs with components from assembled dishes */
  await expandPeriodoIds();
  
  /* Check URL parameters */
  var params = new URLSearchParams(window.location.search);
  var modo = params.get('modo');
  
  renderCats();
  renderSubs();
  renderGrid();
  renderPeriodoBtns();
  renderMenu();
  renderMise();
  renderCompras();
  
  /* modo=cocina: activate periodo filter + switch to menu view */
  if (modo === 'cocina') {
    state.periodo = 'actual';
    renderCats();
    renderSubs();
    renderGrid();
    renderPeriodoBtns();
    switchView('menu');
  }
  /* modo=periodo: just activate periodo filter on catalog */
  if (modo === 'periodo') {
    state.periodo = 'actual';
    renderCats();
    renderSubs();
    renderGrid();
    renderPeriodoBtns();
  }
}

init();
</script>
